syntax = "proto3";

message Authentication {
	string request_type = 1;
	string username = 2;
	string password = 3;
}

message AuthAndIdCheckReply {
	string text = 1;
}

message ExchangeMessage {
	string message_type = 1;
	string sender = 2;
	string receiver = 3;
	string conversation = 4;
}

message ChatEnvelope {
	oneof payload {
		Authentication auth = 1;
		ExchangeMessage exchangemsg = 2;
		AuthAndIdCheckReply authandidcheckreply = 3;
	}
}